<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="description" content="Öğretmen Monitoring Paneli — Derin Denizaltı Mürettebatı"/>
  <title>📊 Öğretmen Paneli</title>
  <link rel="stylesheet" href="css/main.css"/>
  <style>
    :root { --role-color: var(--teacher-purple); --role-glow: var(--teacher-glow); }
    body { overflow-y: auto; }

    .teacher-wrapper { min-height: 100vh; display: flex; flex-direction: column; }

    .teacher-header {
      padding: 14px 16px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(0,0,0,0.35); backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(139,92,246,0.2);
      position: sticky; top: 0; z-index: 100;
    }

    .teacher-role { display: flex; align-items: center; gap: 8px; }
    .teacher-role .icon { font-size: 22px; filter: drop-shadow(0 0 8px var(--teacher-purple)); }
    .teacher-role .name {
      font-family: var(--font-mono); font-size: 16px; font-weight: 700;
      letter-spacing: 2px; color: var(--teacher-purple);
      text-shadow: 0 0 10px var(--teacher-purple);
    }

    .teacher-content { flex: 1; padding: 16px; display: flex; flex-direction: column; gap: 14px; }

    /* ── Büyük istatistik kartları ───────────────────────── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }

    .stat-card {
      padding: 16px;
      text-align: center;
      border-radius: var(--radius-lg);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
    }

    .stat-card-value {
      font-family: var(--font-mono);
      font-size: 32px; font-weight: 700;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-card-label {
      font-size: 10px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase; color: rgba(255,255,255,0.4);
    }

    /* ── Görev geçmişi ───────────────────────────────────── */
    .event-log {
      display: flex; flex-direction: column; gap: 6px;
      max-height: 250px; overflow-y: auto;
    }

    .event-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      background: rgba(255,255,255,0.03);
      font-size: 12px;
      animation: slide-down 200ms ease;
    }

    .event-time {
      font-family: var(--font-mono);
      font-size: 10px; color: rgba(255,255,255,0.3);
      min-width: 55px;
    }

    .event-text { flex: 1; color: rgba(255,255,255,0.75); }

    /* ── Mürettebat ──────────────────────────────────────── */
    .crew-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 16px;
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 6px;
    }

    .crew-avatar-lg { font-size: 26px; }
    .crew-info-block { flex: 1; }
    .crew-role-label { font-size: 10px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; }
    .crew-name-label { font-size: 14px; font-weight: 600; color: white; }
    .crew-status { font-size: 11px; color: rgba(255,255,255,0.45); }
    .crew-conn-tag {
      font-size: 10px; padding: 3px 8px;
      border-radius: 999px; font-weight: 700;
    }
    .crew-conn-tag.conn   { background: rgba(34,197,94,0.12);  color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .crew-conn-tag.no-conn{ background: rgba(239,68,68,0.1);   color: var(--danger-red); border: 1px solid rgba(239,68,68,0.3); }

    /* ── Rapor Bölümü ────────────────────────────────────── */
    .report-section { padding: 20px; }

    .report-metric {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .report-metric:last-child { border-bottom: none; }
    .metric-label { font-size: 13px; color: rgba(255,255,255,0.7); }
    .metric-value {
      font-family: var(--font-mono); font-size: 18px; font-weight: 700;
    }

    .progress-bar-wrap {
      margin-top: 6px; height: 6px;
      background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden;
    }

    .progress-bar {
      height: 100%; border-radius: 3px;
      transition: width 1s ease;
    }

    /* ── Notlar ─────────────────────────────────────────── */
    .teacher-note {
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      background: rgba(139,92,246,0.06);
      border-left: 3px solid var(--teacher-purple);
      font-size: 13px;
      color: rgba(255,255,255,0.8);
      line-height: 1.5;
      margin-bottom: 6px;
    }

    /* ── Oyun durumu badge ───────────────────────────────── */
    .game-state-pill {
      padding: 6px 14px;
      border-radius: 999px;
      font-family: var(--font-mono);
      font-size: 11px; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase;
      transition: var(--transition-med);
    }

    .state-IDLE, .state-LOBBY   { background: rgba(255,255,255,0.07); color: rgba(255,255,255,0.6); }
    .state-BRIEFING             { background: rgba(245,158,11,0.1);  color: var(--captain-gold); border: 1px solid rgba(245,158,11,0.3); }
    .state-EXPLORATION          { background: rgba(6,182,212,0.1);   color: var(--scout-cyan);  border: 1px solid rgba(6,182,212,0.3); }
    .state-QUIZ                 { background: rgba(16,185,129,0.1);  color: var(--bio-green);   border: 1px solid rgba(16,185,129,0.3); }
    .state-CRISIS, .state-RESOLUTION { background: rgba(239,68,68,0.1); color: var(--danger-red); border: 1px solid rgba(239,68,68,0.3); }
    .state-COMPLETE             { background: rgba(139,92,246,0.1);  color: var(--teacher-purple); border: 1px solid rgba(139,92,246,0.3); }
  </style>
</head>
<body>
  <div class="ocean-bg"></div>
  <div class="bubbles">
    <div class="bubble"></div><div class="bubble"></div><div class="bubble"></div>
  </div>

  <div class="teacher-wrapper app-container">
    <!-- Header -->
    <header class="teacher-header">
      <div class="teacher-role">
        <span class="icon">📊</span>
        <div>
          <div class="name">ÖĞRETMEN PANELİ</div>
          <div style="font-size:10px;color:rgba(255,255,255,0.38)" id="session-display">Oturum: —</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="game-state-pill state-IDLE" id="state-pill">BEKLIYOR</div>
        <div class="connection-dot connecting" id="conn-dot"></div>
      </div>
    </header>

    <div class="teacher-content">

      <!-- Anlık İstatistik Kartları -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-value" style="color:var(--captain-gold)" id="stat-score">0</div>
          <div class="stat-card-label">Toplam Puan</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value" style="color:var(--scout-cyan)" id="stat-missions">0</div>
          <div class="stat-card-label">Görev</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value" style="color:var(--bio-green)" id="stat-accuracy">—</div>
          <div class="stat-card-label">Başarı Oranı</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-value" style="color:var(--teacher-purple)" id="stat-players">0</div>
          <div class="stat-card-label">Bağlı Oyuncu</div>
        </div>
      </div>

      <!-- Mürettebat -->
      <div class="glass-card" style="padding:16px">
        <div style="font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
          color:var(--teacher-purple);margin-bottom:12px">🚢 Mürettebat</div>
        <div id="crew-container">
          <p style="font-size:13px;color:rgba(255,255,255,0.3);text-align:center;padding:16px">
            Oyuncular bağlanıyor...
          </p>
        </div>
        <div style="margin-top:12px">
          <button class="btn btn-ghost btn-sm btn-full" id="btn-force-start" onclick="forceStartMission()">
            ⚡ Görevi Zorla Başlat
          </button>
        </div>
      </div>

      <!-- Görev Günlüğü -->
      <div class="glass-card" style="padding:16px">
        <div style="font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
          color:var(--teacher-purple);margin-bottom:12px">📝 Canlı Görev Günlüğü</div>
        <div class="event-log" id="event-log">
          <div class="event-item">
            <span class="event-time">—</span>
            <span class="event-text">Öğretmen paneli başlatıldı. Bağlantı kuruldu.</span>
          </div>
        </div>
      </div>

      <!-- Rapor Bölümü -->
      <div class="glass-card report-section" id="report-section">
        <div style="font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;
          color:var(--teacher-purple);margin-bottom:16px">📈 Performans Raporu</div>

        <div id="report-placeholder" style="text-align:center;padding:24px 0;color:rgba(255,255,255,0.3);font-size:13px">
          Rapor, oyunun sonunda otomatik oluşturulacak.
          <br/>
          <button class="btn btn-ghost btn-sm" style="margin-top:12px" onclick="requestReport()">
            📊 Raporu Şimdi Al
          </button>
        </div>

        <!-- Rapor içeriği (JS ile doldurulur) -->
        <div id="report-content" class="hidden"></div>
      </div>

    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/game-state.js"></script>
  <script src="js/socket-client.js"></script>
  <script src="js/ui-manager.js"></script>
  <script src="js/audio-manager.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const SESSION_ID = params.get("session")?.toUpperCase();
    const PLAYER_NAME = params.get("name") || "Öğretmen";
    let totalAnswers = 0, correctAnswers = 0;
    let sessionStart = Date.now();

    document.getElementById("session-display").textContent = `Oturum: ${SESSION_ID || "—"}`;

    (async () => {
      UIManager.showLoading("Bağlanıyor...");
      await socketClient.connect();
      socketClient.joinSession(SESSION_ID, "teacher", PLAYER_NAME);
    })();

    // ── Socket olayları ──────────────────────────────────────────
    socketClient
      .on("connect",    () => document.getElementById("conn-dot").className = "connection-dot connected")
      .on("disconnect", () => document.getElementById("conn-dot").className = "connection-dot disconnected")

      .on("session-joined", ({ snapshot }) => {
        UIManager.hideLoading();
        updateStats(snapshot);
        renderCrew(snapshot.players);
        addLog("✅", "Öğretmen paneline katıldı.");
      })

      .on("game:player-joined", ({ roleLabel, name, players }) => {
        addLog("🟢", `${roleLabel}: ${name} katıldı.`);
        renderCrew(players);
        document.getElementById("stat-players").textContent = players.filter(p => p.connected).length;
      })

      .on("game:player-left", ({ roleLabel, name, players }) => {
        addLog("🔴", `${roleLabel}: ${name} ayrıldı.`);
        renderCrew(players);
        document.getElementById("stat-players").textContent = players.filter(p => p.connected).length;
      })

      .on("game:state-changed", ({ state, data }) => {
        updateStatePill(state);
        addLog("🎮", `Durum değişti: ${state}`);

        if (state === "RESOLUTION" && data) {
          updateStats({ score: data.score, missionsCompleted: data.missionsCompleted });
        }
        if (state === "COMPLETE" && data?.score !== undefined) {
          updateStats({ score: data.score });
          addLog("🏆", "Oyun tamamlandı!");
        }
      })

      .on("game:marker-detected", ({ markerType, roleLabel, isCorrectMarker }) => {
        const icon = isCorrectMarker ? "✅" : "⚠️";
        addLog(icon, `${roleLabel} ${markerType} marker'ı taradı.${isCorrectMarker ? " [DOĞRU]" : " [Yanlış marker]"}`);
      })

      .on("mission:answer-result", ({ correct, pointsEarned, totalScore }) => {
        totalAnswers++;
        if (correct) correctAnswers++;
        const acc = Math.round((correctAnswers / totalAnswers) * 100);
        document.getElementById("stat-accuracy").textContent = `%${acc}`;
        document.getElementById("stat-score").textContent = totalScore;
        addLog(correct ? "✅" : "❌", `Cevap: ${correct ? "Doğru" : "Yanlış"} (+${pointsEarned} puan)`);
      })

      .on("mission:timer", ({ remaining }) => {
        if (remaining === 60) addLog("⏱", "Keşif aşaması başladı.");
        if (remaining === 30) addLog("⚠️", "30 saniye kaldı!");
      })

      .on("game:report-ready", ({ report }) => {
        renderReport(report);
        UIManager.toast("📊 Rapor hazır!", "success");
      })

      .on("error", ({ message }) => {
        addLog("❌", `Hata: ${message}`);
        UIManager.toast(message, "error");
      });

    // ── Yardımcı Fonksiyonlar ────────────────────────────────────

    function updateStats(snapshot) {
      if (snapshot.score !== undefined) {
        UIManager.animateScore(document.getElementById("stat-score"), 0, snapshot.score);
      }
      if (snapshot.missionsCompleted !== undefined) {
        document.getElementById("stat-missions").textContent = snapshot.missionsCompleted;
      }
      if (snapshot.players) {
        document.getElementById("stat-players").textContent = snapshot.players.filter(p => p.connected).length;
      }
    }

    function renderCrew(players) {
      const container = document.getElementById("crew-container");
      const roleEmojis = { captain:"🎯", scout1:"🔭", scout2:"🔭", biologist:"🔬", teacher:"📊" };
      const roleColors = { captain:"var(--captain-gold)", scout1:"var(--scout-cyan)", scout2:"var(--scout-cyan)", biologist:"var(--bio-green)", teacher:"var(--teacher-purple)" };

      container.innerHTML = players.map(p => `
        <div class="crew-row">
          <span class="crew-avatar-lg">${roleEmojis[p.role] || "👤"}</span>
          <div class="crew-info-block">
            <div class="crew-role-label" style="color:${roleColors[p.role] || "white"}">${p.roleLabel}</div>
            <div class="crew-name-label">${p.name}</div>
          </div>
          <span class="crew-conn-tag ${p.connected ? "conn" : "no-conn"}">
            ${p.connected ? "Bağlı" : "Çevrimdışı"}
          </span>
        </div>
      `).join("");
    }

    function updateStatePill(state) {
      const pill = document.getElementById("state-pill");
      pill.className = `game-state-pill state-${state}`;
      const labels = {
        IDLE: "BEKLEME", LOBBY: "LOBİ", BRIEFING: "BRİFİNG",
        EXPLORATION: "KEŞİF", QUIZ: "SORU", CRISIS: "KRİZ",
        RESOLUTION: "SONUÇ", COMPLETE: "TAMAMLANDI"
      };
      pill.textContent = labels[state] || state;
    }

    function addLog(icon, text) {
      const log = document.getElementById("event-log");
      const elapsed = Math.round((Date.now() - sessionStart) / 1000);
      const min = Math.floor(elapsed / 60).toString().padStart(2, "0");
      const sec = (elapsed % 60).toString().padStart(2, "0");

      const item = document.createElement("div");
      item.className = "event-item";
      item.innerHTML = `
        <span class="event-time">${min}:${sec}</span>
        <span style="font-size:14px">${icon}</span>
        <span class="event-text">${text}</span>
      `;
      log.prepend(item);

      // Max 30 olay göster
      while (log.children.length > 30) log.removeChild(log.lastChild);
    }

    function renderReport(report) {
      document.getElementById("report-placeholder").classList.add("hidden");
      const content = document.getElementById("report-content");
      content.classList.remove("hidden");

      const perf = report.performance;
      const tw = report.teamwork;

      content.innerHTML = `
        <!-- Özet -->
        <div style="padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.06)">
          <div style="font-size:12px;color:rgba(255,255,255,0.4);margin-bottom:2px">Tarih & Saat</div>
          <div style="font-weight:600">${report.date} — ${report.time}</div>
        </div>
        <div class="report-metric">
          <span class="metric-label">Oyun Süresi</span>
          <span class="metric-value" style="color:var(--scout-cyan)">${report.totalPlayTime}</span>
        </div>
        <div class="report-metric">
          <span class="metric-label">Tamamlanan Görev</span>
          <span class="metric-value" style="color:var(--captain-gold)">${report.missionsCompleted}</span>
        </div>
        <div class="report-metric">
          <span class="metric-label">Genel Başarı</span>
          <span class="metric-value" style="color:var(--bio-green)">%${perf.overallAccuracy}</span>
        </div>
        <div class="progress-bar-wrap">
          <div class="progress-bar" id="acc-bar" style="width:0%;background:var(--bio-green)"></div>
        </div>
        <div class="report-metric">
          <span class="metric-label">Toplam Puan</span>
          <span class="metric-value" style="color:var(--captain-gold)">${perf.score.total}</span>
        </div>

        <!-- Konu bazlı -->
        <div style="margin-top:16px;margin-bottom:8px;font-size:10px;font-weight:700;letter-spacing:2px;
          text-transform:uppercase;color:var(--teacher-purple)">Konu Bazlı Performans</div>
        ${perf.subjectPerformance.map(s => `
          <div style="margin-bottom:10px">
            <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px">
              <span style="color:rgba(255,255,255,0.7)">${s.subject}</span>
              <span style="color:${s.percentage >= 70 ? "var(--bio-green)" : "var(--danger-red)"};font-weight:700">%${s.percentage}</span>
            </div>
            <div class="progress-bar-wrap">
              <div class="progress-bar" style="width:${s.percentage}%;
                background:${s.percentage >= 70 ? "var(--bio-green)" : "var(--danger-red)"}"></div>
            </div>
          </div>
        `).join("")}

        <!-- Ekip çalışması -->
        <div style="margin-top:16px;margin-bottom:8px;font-size:10px;font-weight:700;letter-spacing:2px;
          text-transform:uppercase;color:var(--teacher-purple)">Ekip Çalışması</div>
        <div class="report-metric">
          <span class="metric-label">Kaptan Karar Başarısı</span>
          <span class="metric-value" style="color:var(--captain-gold)">%${tw.captainDecisionAccuracy}</span>
        </div>
        <div class="report-metric">
          <span class="metric-label">Gözcü Verimliliği</span>
          <span class="metric-value" style="color:var(--scout-cyan)">%${tw.scoutEfficiency}</span>
        </div>
        <div class="report-metric">
          <span class="metric-label">Ortalama Yanıt Süresi</span>
          <span class="metric-value" style="color:var(--bio-green)">${tw.avgBiologistResponseTime}</span>
        </div>

        <!-- Öğretmen notları -->
        <div style="margin-top:20px;margin-bottom:8px;font-size:10px;font-weight:700;letter-spacing:2px;
          text-transform:uppercase;color:var(--teacher-purple)">💡 Değerlendirme Notları</div>
        ${report.teacherNotes.map(n => `<div class="teacher-note">${n}</div>`).join("")}
      `;

      // Progress bar animasyonu
      setTimeout(() => {
        document.getElementById("acc-bar").style.width = perf.overallAccuracy + "%";
      }, 200);
    }

    function requestReport() {
      socketClient.requestReport();
      UIManager.toast("Rapor isteniyor...", "info", 2000);
    }

    function forceStartMission() {
      socketClient.startMission();
      UIManager.toast("Görev başlatıldı!", "success", 2000);
    }
  </script>
</body>
</html>
